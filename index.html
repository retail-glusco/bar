<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Training Simulator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; user-select: none; overflow: hidden; }
        .btn-ing { transition: transform 0.1s; }
        .btn-ing:active { transform: scale(0.92); }
        .hidden { display: none !important; }
        .progress-bar { transition: width 1s linear; }
        
        .custom-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        /* Сучасні анімації */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake-screen { animation: shake 0.4s ease-in-out; border: 2px solid #ef4444 !important; }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-animate { animation: modalFadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col relative transition-colors duration-300" id="main-body">

    <canvas id="fx-canvas" class="absolute inset-0 pointer-events-none z-40 w-full h-full"></canvas>

        <div class="w-full max-w-md space-y-3.5">

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // --- ВІЗУАЛЬНИЙ ДВИЖОК CANVAS (Конфетті та цифри) ---
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let floaters = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 1) * 8 - 2;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.vy += 0.3; // Гравітація
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.02;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Floater {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0;
            }
            update() {
                this.y -= 1.5; this.life -= 0.02;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.font = "bold 28px 'Segoe UI', sans-serif";
                ctx.textAlign = "center";
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.fillText(this.text, this.x, this.y);
                ctx.shadowBlur = 0; // reset
                ctx.globalAlpha = 1.0;
            }
        }

        function triggerSuccessVFX() {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 3;
            const colors = ['#34d399', '#fcd34d', '#60a5fa', '#fff'];
            // Додаємо іскри
            for(let i=0; i<40; i++) {
                particles.push(new Particle(cx, cy, colors[Math.floor(Math.random() * colors.length)]));
            }
            // Додаємо спливаючий текст +1
            floaters.push(new Floater(cx, cy - 20, "+1 КОКТЕЙЛЬ", "#4ade80"));
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(ctx); if(p.life <= 0) particles.splice(i, 1); });
            floaters.forEach((f, i) => { f.update(); f.draw(ctx); if(f.life <= 0) floaters.splice(i, 1); });
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();


        // --- АУДІО-ДВИЖОК ---
        let audioCtx = null;
        function initAudio() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext && !audioCtx) audioCtx = new AudioContext();
            } catch (e) { console.warn("AudioContext не підтримується"); }
        }
        
        function playSound(type) {
            try {
                if (!audioCtx) initAudio();
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                
                if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                    gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'success') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(554, now + 0.1); osc.frequency.setValueAtTime(659, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'error') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                    gainNode.gain.setValueAtTime(0.4, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                }
            } catch (e) {}
        }

        // --- ДАНІ РЕЦЕПТІВ ---
        const cocktails = [
            { name: "Mango Passion Margarita", icon: "🥭", ingredients: ["Напій «Маргарита Манго Маракуйя» 11.9%", "Лаймові чипси"] },
            { name: "Whisky Sour", icon: "🥃", ingredients: ["Віскі бурбон ВАЙЛД ТЕРКІ", "Сік лимону", "Цукровий сироп", "Настоянка Angostura Bitter", "Концентрат Ізіфом", "Апельсин", "Вишня Амарена Santorelli"] },
            { name: "Pineapple Daiquiri", icon: "🍍", ingredients: ["Напій «Ананасовий Дайкірі» 19.4%", "Ананасові чипси"] },
            { name: "Aviation", icon: "✈️", ingredients: ["Напій «Евіейшн» 21%", "Вишня Амарена Santorelli"] },
            { name: "Mirto Negroni", icon: "🍹", ingredients: ["Напій «Мірто Негроні", "Апельсинові чипси"] },
            { name: "Bloody Mary", icon: "🍅", ingredients: ["Горілка Хортиця Срібна", "Фіпс Бладі Мері МІХ", "Сік томатний", "Сік лимону", "Селера стебло", "Бекон", "Маслини/Оливки"] },
            { name: "Porn Star Martini", icon: "✨", ingredients: ["Напій «Порн Стар» 13.5%", "Концентрат Ізіфом", "Вино Terra Serena «Prosecco Spumante»", "Апельсинові чипси", "Малинова пудра"] },
            { name: "Espresso Martini", icon: "🍸", ingredients: ["Горілка Хортиця Срібна", "Цукровий сироп", "Еспресо допіо", "Кава зерно", "Какао порошок"] },
            { name: "Aperol Spritz", icon: "🍊", ingredients: ["Лікер Апероль Аператив", "Вино Terra Serena «Prosecco Spumante»", "Вода газована", "Вишня Амарена Santorelli", "Апельсин"] },
            { name: "Apricot Old Fashioned", icon: "🍑", ingredients: ["Напій «Абрикосовий Олдфешн» 21.9%", "Цукрова пудра", "Курага"] }
        ];

        const allIngredients = [
            "Напій «Маргарита Манго Маракуйя» 11.9%", "Лаймові чипси", "Віскі бурбон ВАЙЛД ТЕРКІ", 
            "Сік лимону", "Цукровий сироп", "Настоянка Angostura Bitter", "Концентрат Ізіфом", 
            "Апельсин", "Вишня Амарена Santorelli", "Напій «Ананасовий Дайкірі» 19.4%", "Ананасові чипси", 
            "Напій «Евіейшн» 21%", "Напій «Мірто Негроні", "Апельсинові чипси", "Горілка Хортиця Срібна", 
            "Фіпс Бладі Мері МІХ", "Сік томатний", "Селера стебло", "Бекон", "Маслини/Оливки", 
            "Напій «Порн Стар» 13.5%", "Вино Terra Serena «Prosecco Spumante»", "Малинова пудра", "Еспресо допіо", 
            "Кава зерно", "Какао порошок", "Лікер Апероль Аператив", "Вода газована", "Напій «Абрикосовий Олдфешн» 21.9%", 
            "Цукрова пудра", "Курага"
        ];

        // --- ІГРОВА ЛОГІКА ---
        let currentMode = ''; 
        let currentTarget = null;
        let shaker = [];
        let score = 0;
        let mistakes = 0;
        let timeLeft = 420; 
        let elapsedTime = 0; 
        let timerInterval;
        let cocktailQueue = []; 

        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Кастомне модальне вікно для помилок (замість alert)
        let modalCallback = null;
        function showCustomModal(title, text, callback) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            modalCallback = callback;
            
            modal.classList.remove('hidden');
            // Маленька затримка для CSS анімації opacity
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
        }

        document.getElementById('modal-btn').addEventListener('click', () => {
            playSound('click');
            const modal = document.getElementById('custom-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => { 
                modal.classList.add('hidden');
                if (modalCallback) modalCallback();
            }, 300); // чекаємо завершення CSS transition
        });

        function returnToQueue(cocktail) {
            if (cocktailQueue.length === 0) cocktailQueue.push(cocktail);
            else {
                const minPos = Math.min(2, cocktailQueue.length);
                const maxPos = cocktailQueue.length;
                const targetPos = Math.floor(Math.random() * (maxPos - minPos + 1)) + minPos;
                cocktailQueue.splice(targetPos, 0, cocktail);
            }
        }

        function hideAll() {
            playSound('click');
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-learn').classList.add('hidden');
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('overlay-result').classList.add('hidden');
            clearInterval(timerInterval);
        }

        function showMenu() {
            hideAll();
            document.getElementById('screen-menu').classList.remove('hidden');
        }

        function startLearn() {
            hideAll();
            document.getElementById('screen-learn').classList.remove('hidden');
            const list = document.getElementById('learn-list');
            list.innerHTML = cocktails.map((c, idx) => `
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-md">
                    <div class="text-base font-black text-amber-400 mb-2 flex items-center gap-2">
                        <span class="text-xl">${c.icon}</span> ${idx + 1}. ${c.name}
                    </div>
                    <div class="flex flex-wrap gap-1.5 mt-3">
                        ${c.ingredients.map(ing => `<span class="bg-slate-900 text-slate-300 text-[11px] px-2.5 py-1.5 rounded border border-slate-700">${ing}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function initHeaderUI() {
            const pb = document.getElementById('practice-badge');
            const as = document.getElementById('active-stats');
            const mm = document.getElementById('mistakes-max');
            const tc = document.getElementById('ta-timer-container');
            const tb = document.getElementById('timer-bar');

            if (currentMode === 'practice') {
                pb.classList.remove('hidden'); as.classList.add('hidden'); tb.classList.add('hidden');
            } else if (currentMode === 'timeattack') {
                pb.classList.add('hidden'); as.classList.remove('hidden');
                mm.classList.add('hidden'); tc.classList.remove('hidden'); tb.classList.add('hidden');
            } else if (currentMode === 'exam') {
                pb.classList.add('hidden'); as.classList.remove('hidden');
                mm.classList.remove('hidden'); mm.innerText = '/1'; 
                tc.classList.add('hidden'); tb.classList.remove('hidden');
            }
        }

        function startPractice() {
            hideAll(); currentMode = 'practice'; score = 0; mistakes = 0;
            document.getElementById('screen-game').classList.remove('hidden');
            initHeaderUI(); cocktailQueue = shuffleArray([...cocktails]); 
            initGameUI(); nextCocktail();
        }

        function startTimeAttack() {
            hideAll(); currentMode = 'timeattack'; score = 0; mistakes = 0; elapsedTime = 0;
            document.getElementById('screen-game').classList.remove('hidden');
            initHeaderUI(); updateExamStats(); cocktailQueue = shuffleArray([...cocktails]); 
            initGameUI(); nextCocktail();

            document.getElementById('ta-timer-display').innerText = 0;
            timerInterval = setInterval(() => {
                elapsedTime++;
                document.getElementById('ta-timer-display').innerText = elapsedTime;
            }, 1000);
        }

        function startExam() {
            hideAll(); currentMode = 'exam'; score = 0; mistakes = 0; timeLeft = 420; 
            document.getElementById('screen-game').classList.remove('hidden');
            initHeaderUI(); updateExamStats(); cocktailQueue = shuffleArray([...cocktails]); 
            initGameUI(); nextCocktail();
            
            document.getElementById('timer-progress').style.width = '100%';
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-progress').style.width = `${(timeLeft/420)*100}%`;
                if(timeLeft <= 0) endGame("⏰ ЧАС ВИЙШОВ", "Ви не вклалися у відведені 7 хвилин.");
            }, 1000);
        }

        function initGameUI() {
            const kb = document.getElementById('keyboard');
            const sortedIngs = [...allIngredients].sort((a, b) => a.localeCompare(b, 'uk'));
            const half = Math.ceil(sortedIngs.length / 2);
            const columnMajorArray = [];
            
            for (let i = 0; i < half; i++) {
                columnMajorArray.push(sortedIngs[i]); 
                if (i + half < sortedIngs.length) columnMajorArray.push(sortedIngs[i + half]); 
            }

            kb.innerHTML = columnMajorArray.map(ing => `
                <button onclick="addIng('${ing.replace(/'/g, "\\'")}')" class="bg-slate-800 hover:bg-slate-700 active:bg-blue-900 border border-slate-700 text-slate-200 rounded-lg py-2.5 px-2 text-[11px] font-medium shadow-sm btn-ing text-left leading-tight truncate transition-colors">
                    🔹 ${ing}
                </button>
            `).join('');
            clearShaker();
        }

        function nextCocktail() {
            if (!currentTarget && cocktailQueue.length === 0) {
                if (currentMode === 'exam') {
                    playSound('success'); triggerSuccessVFX();
                    setTimeout(() => endGame("🎉 ІСПИТ ЗАВЕРШЕНО", "Чудова робота! Ви успішно пройшли атестацію."), 1000);
                    return;
                } else if (currentMode === 'timeattack') {
                    endTimeAttackGame(); return;
                } else {
                    playSound('success'); triggerSuccessVFX();
                    setTimeout(() => {
                        showCustomModal("Практика", "Ви бездоганно приготували всі напої. Колода перемішується заново!", () => {
                            cocktailQueue = shuffleArray([...cocktails]);
                            nextCocktail();
                        });
                    }, 1000);
                    return;
                }
            }
            if (cocktailQueue.length > 0) {
                currentTarget = cocktailQueue.shift();
                document.getElementById('target-cocktail').innerText = `${currentTarget.icon} ${currentTarget.name}`;
            }
            clearShaker();
        }

        function addIng(ing) {
            playSound('click'); shaker.push(ing); renderShaker();
        }

        function clearShaker() {
            playSound('click'); shaker = []; renderShaker();
        }

        function renderShaker() {
            const area = document.getElementById('shaker-area');
            if (shaker.length === 0) {
                area.innerHTML = '<span class="text-slate-500 m-auto text-xs italic">Додайте необхідні компоненти з меню знизу...</span>';
            } else {
                area.innerHTML = shaker.map((ing, idx) => `
                    <span class="animate-pop bg-slate-900 text-blue-300 border border-blue-900/50 text-[10px] px-2 py-1.5 rounded shadow-sm flex items-center gap-1">
                        ${ing}
                        <b class="text-red-400 hover:text-red-300 cursor-pointer pl-1 text-sm leading-none" onclick="event.stopPropagation(); removeIng(${idx})">×</b>
                    </span>
                `).join('');
            }
        }

        function removeIng(index) {
            playSound('click'); shaker.splice(index, 1); renderShaker();
        }

        function triggerErrorShake() {
            playSound('error');
            const screen = document.getElementById('screen-game');
            screen.classList.add('shake-screen');
            setTimeout(() => { screen.classList.remove('shake-screen'); }, 400);
        }

        function checkRecipe() {
            if (!currentTarget) return;
            const required = [...currentTarget.ingredients].sort();
            const assembled = [...shaker].sort();
            const isCorrect = required.length === assembled.length && required.every((val, index) => val === assembled[index]);

            if (isCorrect) {
                playSound('success'); triggerSuccessVFX();
                score++; updateExamStats();

                if (currentMode === 'exam') {
                    timeLeft = Math.min(420, timeLeft + 4); 
                    if (cocktailQueue.length === 0) {
                        setTimeout(() => endGame("🎉 ІСПИТ ЗАВЕРШЕНО", `Ви відповіли на всі питання. Ваш результат: ${score}/10.`), 1000);
                        return;
                    }
                } else if (currentMode === 'timeattack') {
                    if (score === 10) { endTimeAttackGame(); return; }
                }
                
                currentTarget = null;
                setTimeout(() => nextCocktail(), 600); // Пауза, щоб подивитись на іскри
            } else {
                triggerErrorShake();
                mistakes++; updateExamStats();
                
                const errText = `Для <b>${currentTarget.name}</b> потрібно використовувати:<br><br><span class="text-slate-400 text-xs text-left inline-block">• ${currentTarget.ingredients.join('<br>• ')}</span>`;

                setTimeout(() => {
                    showCustomModal("Помилка в рецепті!", errText, () => {
                        if (currentMode === 'exam') {
                            if (mistakes >= 2) { 
                                endGame("❌ ІСПИТ ПРОВАЛЕНО", "Ви припустилися більше ніж 1 помилки під час атестації.");
                            } else if (cocktailQueue.length === 0) {
                                endGame("🎉 ІСПИТ ЗАВЕРШЕНО", `Всі питання вичерпано. Ваш результат: ${score}/10.`);
                            } else {
                                currentTarget = null; nextCocktail();
                            }
                        } else if (currentMode === 'timeattack') {
                            cocktailQueue.push(currentTarget);
                            currentTarget = null; nextCocktail();
                        } else {
                            returnToQueue(currentTarget);
                            currentTarget = null; nextCocktail();
                        }
                    });
                }, 400); // Чекаємо, поки закінчиться трясучка, і показуємо вікно
            }
        }

        function updateExamStats() {
            document.getElementById('score-display').innerText = score;
            document.getElementById('mistakes-display').innerText = mistakes;
        }

        function endTimeAttackGame() {
            clearInterval(timerInterval);
            document.getElementById('overlay-result').classList.remove('hidden');
            document.getElementById('result-title').innerText = "🏁 ШВИДКІСНИЙ ШЕЙК ЗАВЕРШЕНО";
            document.getElementById('result-icon').innerText = "⏱️";
            
            let record = null;
            const now = new Date();
            const dateStr = now.toLocaleDateString('uk-UA');
            
            try {
                const recordStr = localStorage.getItem('glusco_bar_record');
                if (recordStr) record = JSON.parse(recordStr);
            } catch(e) {}
            
            let msg = `Ви успішно зібрали всі 10 напоїв!<br>Ваш підсумковий час: <span class="font-bold text-2xl text-amber-400 drop-shadow">${elapsedTime} сек</span>.<br>Невдалих спроб за зміну: ${mistakes}.<br><br>`;
            
            if (!record || elapsedTime < record.time) {
                try { localStorage.setItem('glusco_bar_record', JSON.stringify({ time: elapsedTime, date: dateStr })); } catch(e) {}
                msg += `<span class="text-green-400 font-bold text-lg animate-pulse block mt-2">🥳 ВІТАЄМО! ЦЕ НОВИЙ РЕКОРД ЗМІНИ!</span>`;
            } else {
                msg += `<span class="text-slate-400 block mt-2 text-xs border border-slate-700 bg-slate-800/50 p-2 rounded">Не вийшло побити результат від ${record.date} (${record.time} сек). Спробуйте ще раз!</span>`;
            }
            document.getElementById('result-msg').innerHTML = msg;
        }

        function endGame(title, message) {
            clearInterval(timerInterval);
            document.getElementById('overlay-result').classList.remove('hidden');
            document.getElementById('result-title').innerText = title;
            
            const isPassed = currentMode === 'exam' ? (score >= 10 && mistakes < 2) : true;
            if (!isPassed) playSound('error');
            else { playSound('success'); triggerSuccessVFX(); }
            
            const statusText = isPassed ? "<span class='text-green-400 font-bold drop-shadow'>АТЕСТАЦІЮ ПРОЙДЕНО!</span>" : "<span class='text-red-500 font-bold drop-shadow'>АТЕСТАЦІЮ НЕ СКЛАДЕНО.</span>";
            document.getElementById('result-icon').innerText = isPassed ? "🏆" : "📉";
            
            document.getElementById('result-msg').innerHTML = `
                ${message}<br><br>
                Правильних відповідей: <span class="font-bold text-xl text-amber-400">${score}</span> з 10<br>
                Статус: ${statusText}
            `;
        }
    </script>
</body>
</html>
